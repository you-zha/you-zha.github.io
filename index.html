<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOGS — Голосование + Фортуна</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #12121c; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; color: #eee; }
        .container { max-width: 700px; width: 100%; background: #1e1e30; padding: 25px; border-radius: 20px; }
        h1 { text-align: center; color: #f0a030; cursor: pointer; user-select: none; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .counter { text-align: center; color: #f0a030; font-size: 20px; font-weight: bold; margin: 10px 0; }
        .btn { background: #f0a030; color: #12121c; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; margin: 5px 0; }
        .btn:hover { background: #d48a1a; transform: scale(1.02); }
        .btn-secondary { background: #3a3a5a; color: #ddd; }
        .btn-secondary:hover { background: #4a4a6a; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-fortune { background: #7b2fbe; color: #fff; }
        .btn-fortune:hover { background: #9b4fde; }
        .input-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        .input-row label { min-width: 30px; color: #aaa; }
        .input-row input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #444; background: #12121c; color: #fff; }
        .input-group { background: #2a2a40; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .hidden { display: none; }
        .status { color: #888; text-align: center; margin: 10px 0; }
        .dev-panel { background: #2a2a40; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px dashed #f0a030; }
        .dev-panel .btn { font-size: 13px; padding: 8px 16px; width: auto; display: inline-block; margin-right: 8px; }
        .dev-hidden { display: none; }
        .song-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #333; }
        .song-item:last-child { border-bottom: none; }
        .song-item.blocked { opacity: 0.4; pointer-events: none; }
        .your-label { color: #f0a030; font-size: 13px; margin-left: 10px; }
        .winner { background: #2a3a2a; padding: 8px; border-radius: 6px; margin: 4px 0; }
        .result-votes { color: #aaa; margin-left: 10px; }
        .vote-status { text-align: center; color: #f0a030; margin: 10px 0; font-size: 14px; }
        .timer-info { text-align: center; color: #888; font-size: 13px; margin: 5px 0; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1e1e30;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #f0a030;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #888;
            background: none;
            border: none;
        }
        .modal-close:hover { color: #fff; }
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 15px auto;
        }
        #wheelCanvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(240,160,48,0.3);
            cursor: pointer;
        }
        .wheel-result {
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            min-height: 50px;
            background: #2a2a40;
            border: 2px solid #f0a030;
            transition: all 0.3s;
        }
        .wheel-result.highlight {
            background: #f0a030;
            color: #12121c;
            border-color: #f0a030;
            box-shadow: 0 0 30px rgba(240,160,48,0.5);
            transform: scale(1.05);
        }
        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .btn-spin {
            background: #f0a030;
            color: #12121c;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            width: 80%;
        }
        .btn-spin:hover { transform: scale(1.05); background: #d48a1a; }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="mainTitle">🎵 THE DOGS — голосование</h1>
    <div class="subtitle">Самара (UTC+4) • Нельзя голосовать за свои песни</div>

    <div id="counterDisplay" class="counter">🎵 0 / 12 песен</div>
    <div id="voteStatusDisplay" class="vote-status"></div>
    <div id="timerInfo" class="timer-info"></div>

    <div id="devPanel" class="dev-panel dev-hidden">
        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
            <span style="font-weight: bold; color: #f0a030;">🛠️ Режим разработчика</span>
            <button class="btn btn-secondary" id="devResetBtn">🔄 Сбросить всё</button>
            <button class="btn btn-secondary" id="devForcePhaseBtn">⏩ Переключить фазу</button>
            <button class="btn btn-secondary" id="devHidePanelBtn">✖️ Скрыть</button>
        </div>
        <div style="margin-top: 6px; font-size: 13px; color: #aaa;">
            <span id="devStatus">Данные: </span>
        </div>
    </div>

    <div id="stepCollect">
        <div id="memberFormContainer"></div>
        <div id="collectStatus" class="status"></div>
        <button class="btn btn-secondary" id="finishCollectBtn" disabled>⏳ Нужно ещё 12 песен</button>
    </div>

    <div id="stepVote" class="hidden">
        <div class="input-group">
            <p><strong>Вход для голосования</strong></p>
            <input type="text" id="voterNameInput" placeholder="Ваше имя" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#12121c; color:#fff; margin-bottom:10px;">
            <input type="password" id="voterPasswordInput" placeholder="Ваш пароль" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#12121c; color:#fff; margin-bottom:10px;">
            <button class="btn btn-secondary" id="loginBtn">🔑 Войти</button>
        </div>
        <div id="voteSongList"></div>
        <button class="btn" id="voteBtn" disabled>🗳️ Проголосовать</button>
        <div id="voteStatus" class="status"></div>
    </div>

    <div id="stepResults" class="hidden">
        <div id="resultBox"></div>
        <button class="btn btn-secondary" id="resetBtn">🔄 Начать новый цикл</button>
    </div>

    <div id="stepWait" class="hidden">
        <p style="color:#888;">⏳ Ожидание. Новый сбор начнется во вторник в 12:00.</p>
    </div>
</div>

<div class="modal-overlay" id="fortuneModal">
    <div class="modal-content">
        <button class="modal-close" id="closeFortuneBtn">&times;</button>
        <h2 style="color:#f0a030; margin-bottom: 10px;">🎡 Колесо фортуны</h2>
        <p style="color:#aaa; font-size:14px; margin-bottom: 15px;">Крути — и узнай, что играем!</p>
        <div class="wheel-container">
            <div class="pointer">▼</div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        <div id="wheelResult" class="wheel-result">🎯 Нажми «Крутить!»</div>
        <button class="btn-spin" id="spinBtn">🔄 Крутить!</button>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const STORAGE_KEY = 'dogs_voting';
        const VOTE_DURATION_HOURS = 24;

        const FORTUNE_ITEMS = [
            { text: '🍑 Гурковский проиграл жопу', weight: 10 },
            { text: '👠 Поем лабутены', weight: 3 },
            { text: '👑 День короля и шута', weight: 4 },
            { text: '🎸 Наконец играем Арию', weight: 1 },
            { text: '💩 День отвратительной попсы', weight: 4 },
            { text: '🕰️ Старые песни', weight: 3 },
            { text: '🎬 Песни из мультфильмов', weight: 3 },
            { text: '🎲 Рок-классика', weight: 4 }
        ];
        const FORTUNE_TEXTS = FORTUNE_ITEMS.map(item => item.text);
        const FORTUNE_WEIGHTS = FORTUNE_ITEMS.map(item => item.weight);
        const COLORS = ['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6','#e67e22','#1abc9c','#e84393'];

        let DATA = { songs: [], members: [], votes: {}, voters: [], phase: 'collect', voteStartTime: null };
        let currentVoter = null;
        let wheelRotation = 0;
        let isSpinning = false;
        let canvas, ctx;

        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try { DATA = JSON.parse(raw); } catch(e) {}
            }
            if (!DATA.songs) DATA.songs = [];
            if (!DATA.members) DATA.members = [];
            if (!DATA.votes) DATA.votes = {};
            if (!DATA.voters) DATA.voters = [];
            if (!DATA.phase) DATA.phase = 'collect';
            if (!DATA.voteStartTime) DATA.voteStartTime = null;
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
        }

        function updateCounter() {
            document.getElementById('counterDisplay').textContent = `🎵 ${DATA.songs.length} / 12 песен`;
        }

        function checkAutoComplete() {
            if (DATA.phase !== 'vote') return;
            const totalMembers = DATA.members.length;
            const votedCount = DATA.voters.length;
            if (totalMembers > 0 && votedCount >= totalMembers) {
                DATA.phase = 'results';
                saveData();
                render();
                return;
            }
            if (DATA.voteStartTime) {
                const elapsed = (Date.now() - DATA.voteStartTime) / (1000 * 60 * 60);
                if (elapsed >= VOTE_DURATION_HOURS) {
                    DATA.phase = 'results';
                    saveData();
                    render();
                    return;
                }
            }
        }

        function render() {
            loadData();
            updateCounter();
            checkAutoComplete();

            document.getElementById('stepCollect').classList.add('hidden');
            document.getElementById('stepVote').classList.add('hidden');
            document.getElementById('stepResults').classList.add('hidden');
            document.getElementById('stepWait').classList.add('hidden');

            if (DATA.phase === 'collect') {
                document.getElementById('stepCollect').classList.remove('hidden');
                renderCollect();
            } else if (DATA.phase === 'vote') {
                document.getElementById('stepVote').classList.remove('hidden');
                renderVote();
                updateVoteStatus();
            } else if (DATA.phase === 'results') {
                document.getElementById('stepResults').classList.remove('hidden');
                renderResults();
            } else {
                document.getElementById('stepWait').classList.remove('hidden');
            }

            document.getElementById('devStatus').textContent =
                `Фаза: ${DATA.phase} | Песен: ${DATA.songs.length} | Проголосовало: ${DATA.voters.length}`;
        }

        function updateVoteStatus() {
            const total = DATA.members.length;
            const voted = DATA.voters.length;
            const statusEl = document.getElementById('voteStatusDisplay');
            const timerEl = document.getElementById('timerInfo');

            if (total === 0) {
                statusEl.textContent = '⏳ Ожидание начала голосования...';
                timerEl.textContent = '';
                return;
            }

            statusEl.textContent = `🗳️ Проголосовало: ${voted} из ${total} участников`;

            if (DATA.voteStartTime) {
                const elapsed = (Date.now() - DATA.voteStartTime) / (1000 * 60 * 60);
                const remaining = Math.max(0, VOTE_DURATION_HOURS - elapsed);
                const hours = Math.floor(remaining);
                const minutes = Math.floor((remaining - hours) * 60);
                timerEl.textContent = `⏳ Осталось времени: ${hours} ч ${minutes} мин`;
            } else {
                timerEl.textContent = '⏳ Время голосования не установлено';
            }
        }

        function renderCollect() {
            const formContainer = document.getElementById('memberFormContainer');
            const status = document.getElementById('collectStatus');
            const finishBtn = document.getElementById('finishCollectBtn');

            const existingName = document.getElementById('newMemberName')?.value || '';
            const existingPass = document.getElementById('newMemberPassword')?.value || '';
            const existingSongs = [];
            document.querySelectorAll('.song-input').forEach(inp => {
                existingSongs.push(inp.value);
            });

            formContainer.innerHTML = '';

            if (DATA.songs.length < 12) {
                let formHtml = '<div class="input-group">';
                formHtml += '<p><strong>Добавьте свои 4 песни</strong></p>';
                formHtml += `<input type="text" id="newMemberName" placeholder="Ваше имя" value="${existingName}" style="width:100%; padding:8px; border-radius:8px; border:1px solid #444; background:#12121c; color:#fff; margin-bottom:10px;">`;
                formHtml += `<input type="password" id="newMemberPassword" placeholder="Пароль (мин. 4 символа)" value="${existingPass}" style="width:100%; padding:8px; border-radius:8px; border:1px solid #444; background:#12121c; color:#fff; margin-bottom:10px;">`;
                formHtml += '<p style="color:#888; font-size:12px; margin-bottom:10px;">🔑 Пароль нужен для голосования</p>';
                for (let i = 0; i < 4; i++) {
                    const val = existingSongs[i] || '';
                    formHtml += '<div class="input-row">';
                    formHtml += '<label>' + (i+1) + '.</label>';
                    formHtml += `<input type="text" class="song-input" placeholder="Песня ${i+1}" value="${val}">`;
                    formHtml += '</div>';
                }
                formHtml += '<button class="btn btn-secondary" onclick="window.addMember()">➕ Добавить песни</button>';
                formHtml += '</div>';
                formContainer.innerHTML = formHtml;
                status.textContent = 'Введите свои 4 песни и нажмите «Добавить».';
            } else {
                formContainer.innerHTML = '<p style="color:#6c6; text-align:center;">✅ Все 12 песен собраны!</p>';
                status.textContent = 'Сбор завершён!';
            }

            if (DATA.songs.length > 0 && DATA.songs.length < 12) {
                const lastMember = DATA.members[DATA.members.length - 1];
                if (lastMember) {
                    status.innerHTML = `✅ ${lastMember.name}, ваши 4 песни добавлены!`;
                    setTimeout(() => {
                        const modal = document.getElementById('fortuneModal');
                        if (modal) {
                            modal.classList.add('active');
                            drawWheel(wheelRotation);
                        }
                    }, 500);
                }
            }

            const canFinish = (DATA.songs.length === 12);
            finishBtn.disabled = !canFinish;
            finishBtn.textContent = canFinish ? '✅ Завершить сбор' : `⏳ Нужно ещё ${12 - DATA.songs.length} песен`;
        }

        window.addMember = function() {
            const nameInput = document.getElementById('newMemberName');
            const passInput = document.getElementById('newMemberPassword');
            const songInputs = document.querySelectorAll('.song-input');

            const name = nameInput.value.trim();
            const password = passInput.value.trim();

            if (!name) { alert('Введите имя!'); return; }
            if (!password || password.length < 4) { alert('Пароль должен быть минимум 4 символа!'); return; }

            const songs = [];
            songInputs.forEach(inp => {
                const val = inp.value.trim();
                if (!val) { alert('Заполните все 4 песни!'); return; }
                songs.push(val);
            });
            if (songs.length !== 4) return;

            if (DATA.members.some(m => m.name === name)) {
                alert('Участник "' + name + '" уже добавлял песни!');
                return;
            }
            if (DATA.songs.length + songs.length > 12) {
                alert('Нельзя добавить больше 12 песен!');
                return;
            }

            DATA.members.push({ name, password });
            DATA.songs.push(...songs);
            saveData();
            render();
            alert('✅ Ваши 4 песни добавлены!');
        };

        document.getElementById('finishCollectBtn').addEventListener('click', function() {
            if (DATA.songs.length !== 12) {
                alert('Нужно ровно 12 песен! Сейчас ' + DATA.songs.length);
                return;
            }
            DATA.phase = 'vote';
            DATA.voteStartTime = Date.now();
            saveData();
            render();
        });

        function renderVote() {
            const list = document.getElementById('voteSongList');
            const status = document.getElementById('voteStatus');
            const voteBtn = document.getElementById('voteBtn');

            list.innerHTML = '';
            status.textContent = '';
            voteBtn.disabled = true;

            if (DATA.songs.length !== 12) {
                list.innerHTML = '<p style="color:#888;">Недостаточно песен для голосования.</p>';
                return;
            }

            document.getElementById('loginBtn').onclick = function() {
                const name = document.getElementById('voterNameInput').value.trim();
                const password = document.getElementById('voterPasswordInput').value.trim();

                if (!name) { alert('Введите имя!'); return; }
                if (!password) { alert('Введите пароль!'); return; }

                const member = DATA.members.find(m => m.name === name);
                if (!member) {
                    alert('Участник "' + name + '" не найден!');
                    return;
                }
                if (member.password !== password) {
                    alert('❌ Неверный пароль!');
                    return;
                }

                if (DATA.voters.includes(name)) {
                    alert('Вы уже проголосовали!');
                    return;
                }

                currentVoter = name;
                renderVoteSongs(name);
            };
        }

        function renderVoteSongs(name) {
            const list = document.getElementById('voteSongList');
            const status = document.getElementById('voteStatus');
            const voteBtn = document.getElementById('voteBtn');

            if (!name) {
                list.innerHTML = '<p style="color:#888;">Войдите в систему.</p>';
                voteBtn.disabled = true;
                return;
            }

            const memberIndex = DATA.members.findIndex(m => m.name === name);
            const start = memberIndex * 4;
            const end = start + 4;
            const ownIndices = [];
            for (let i = start; i < end; i++) ownIndices.push(i);

            const items = DATA.songs.map((song, index) => ({ song, index, isOwn: ownIndices.includes(index) }));
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }

            let html = '';
            items.forEach(item => {
                const blocked = item.isOwn ? 'blocked' : '';
                const label = item.isOwn ? '<span class="your-label">(ваша — нельзя)</span>' : '';
                html += '<div class="song-item ' + blocked + '">';
                html += '<input type="checkbox" data-index="' + item.index + '" ' + (item.isOwn ? 'disabled' : '') + '>';
                html += '<span>' + (item.index+1) + '. ' + item.song + ' ' + label + '</span>';
                html += '</div>';
            });
            list.innerHTML = html;

            const checkboxes = list.querySelectorAll('input[type="checkbox"]:not([disabled])');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', function() {
                    const checked = list.querySelectorAll('input[type="checkbox"]:checked');
                    if (checked.length > 6) {
                        this.checked = false;
                        alert('Можно выбрать не больше 6 песен.');
                    }
                });
            });

            voteBtn.disabled = false;
            status.textContent = 'Вы вошли как ' + name + '. Выберите 6 песен.';
        }

        document.getElementById('voteBtn').addEventListener('click', function() {
            const name = currentVoter;
            if (!name) { alert('Сначала войдите!'); return; }
            if (!DATA.members.some(m => m.name === name)) { alert('Ошибка!'); return; }
            if (DATA.voters.includes(name)) { alert('Вы уже голосовали!'); return; }

            const checked = document.querySelectorAll('#voteSongList input[type="checkbox"]:checked');
            if (checked.length === 0) { alert('Выберите хотя бы одну песню.'); return; }

            const indices = [];
            checked.forEach(cb => { indices.push(parseInt(cb.dataset.index)); });

            DATA.votes[name] = indices;
            DATA.voters.push(name);
            saveData();

            const modal = document.getElementById('fortuneModal');
            if (modal) {
                modal.classList.add('active');
                drawWheel(wheelRotation);
                setTimeout(() => {
                    spinWheel();
                }, 300);
            }

            render();
            alert('✅ Ваш голос учтён!');
        });

        function renderResults() {
            const box = document.getElementById('resultBox');
            if (DATA.songs.length !== 12) {
                box.innerHTML = '<p style="color:#888;">Недостаточно данных.</p>';
                return;
            }

            const counts = {};
            DATA.songs.forEach((_, idx) => counts[idx] = 0);
            for (const voter in DATA.votes) {
                DATA.votes[voter].forEach(idx => {
                    if (counts[idx] !== undefined) counts[idx]++;
                });
            }

            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const top6 = sorted.slice(0, 6);

            let html = '<h3 style="color:#f0a030;">🏆 Топ-6 песен</h3>';
            top6.forEach(([idx, count], pos) => {
                html += '<div class="winner">' + (pos+1) + '. ' + DATA.songs[parseInt(idx)] + ' — <span class="result-votes">' + count + ' голосов</span></div>';
            });

            if (sorted.length > 6) {
                html += '<div style="margin-top:15px; color:#888; font-size:14px;">Остальные:</div>';
                sorted.slice(6).forEach(([idx, count]) => {
                    html += '<div style="padding:3px 0; border-bottom:1px solid #222; font-size:13px; color:#aaa;">' + DATA.songs[parseInt(idx)] + ' — ' + count + ' голосов</div>';
                });
            }

            html += '<div style="margin-top:15px; color:#888; font-size:14px;">👥 Проголосовало: ' + DATA.voters.length + ' человек</div>';
            box.innerHTML = html;
        }

        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Сбросить все данные?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        });

        let clickCount = 0;
        document.getElementById('mainTitle').addEventListener('click', function() {
            clickCount++;
            if (clickCount >= 3) {
                document.getElementById('devPanel').classList.toggle('dev-hidden');
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        });

        document.getElementById('devResetBtn').addEventListener('click', function() {
            if (confirm('Сбросить все данные?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        });

        document.getElementById('devForcePhaseBtn').addEventListener('click', function() {
            const phases = ['collect', 'vote', 'results'];
            const current = DATA.phase || 'collect';
            let idx = phases.indexOf(current);
            if (idx === -1) idx = 0;
            const next = phases[(idx + 1) % phases.length];
            DATA.phase = next;
            saveData();
            render();
        });

        document.getElementById('devHidePanelBtn').addEventListener('click', function() {
            document.getElementById('devPanel').classList.add('dev-hidden');
        });

        function getWeightedRandomIndex() {
            const totalWeight = FORTUNE_WEIGHTS.reduce((a, b) => a + b, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < FORTUNE_WEIGHTS.length; i++) {
                random -= FORTUNE_WEIGHTS[i];
                if (random <= 0) {
                    return i;
                }
            }
            return FORTUNE_WEIGHTS.length - 1;
        }

        function drawWheel(rotation) {
            const size = canvas.width;
            const centerX = size/2, centerY = size/2;
            const radius = size/2 - 10;
            const count = FORTUNE_TEXTS.length;
            const arcSize = (2 * Math.PI) / count;

            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < count; i++) {
                const startAngle = rotation + i * arcSize;
                const endAngle = startAngle + arcSize;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = COLORS[i % COLORS.length];
                ctx.fill();
                ctx.strokeStyle = '#12121c';
                ctx.lineWidth = 2;
                ctx.stroke();

                const angle = startAngle + arcSize/2;
                const textRadius = radius * 0.65;
                const x = centerX + Math.cos(angle) * textRadius;
                const y = centerY + Math.sin(angle) * textRadius;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI/2);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(FORTUNE_TEXTS[i], 0, 0);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#f0a030';
            ctx.fill();
            ctx.strokeStyle = '#12121c';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#12121c';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎸', centerX, centerY);
        }

        function getResultIndex(rotation) {
            const count = FORTUNE_TEXTS.length;
            const arcSize = (2 * Math.PI) / count;
            const pointerAngle = -Math.PI / 2;
            let raw = (pointerAngle - rotation) % (2 * Math.PI);
            if (raw < 0) raw += 2 * Math.PI;
            return Math.floor(raw / arcSize) % count;
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('wheelResult').textContent = '🌀 Крутим...';
            document.getElementById('wheelResult').classList.remove('highlight');

            const targetIndex = getWeightedRandomIndex();
            const targetAngle = wheelRotation + (5 + Math.random() * 5) * 2 * Math.PI + 
                                (targetIndex / FORTUNE_TEXTS.length) * 2 * Math.PI;

            const startTime = performance.now();
            const duration = 4000 + Math.random() * 2000;

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const currentAngle = wheelRotation + (targetAngle - wheelRotation) * ease;
                drawWheel(currentAngle);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    wheelRotation = targetAngle % (2 * Math.PI);
                    const resultIdx = getResultIndex(wheelRotation);
                    const result = FORTUNE_TEXTS[resultIdx];
                    document.getElementById('wheelResult').textContent = '🎯 ' + result;
                    document.getElementById('wheelResult').classList.add('highlight');
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                    
                    // Автоматическое закрытие через 2.5 секунды
                    setTimeout(() => {
                        document.getElementById('fortuneModal').classList.remove('active');
                    }, 2500);
                }
            }
            requestAnimationFrame(animate);
        }

        function initWheel() {
            canvas = document.getElementById('wheelCanvas');
            ctx = canvas.getContext('2d');
            drawWheel(0);
            document.getElementById('spinBtn').addEventListener('click', spinWheel);
            canvas.addEventListener('click', spinWheel);
        }

        // --- ЗАКРЫТИЕ КОЛЕСА (крестик, фон, ESC) ---
        document.getElementById('closeFortuneBtn').addEventListener('click', function() {
            document.getElementById('fortuneModal').classList.remove('active');
        });

        document.getElementById('fortuneModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('fortuneModal').classList.remove('active');
            }
        });

        // --- ЗАПУСК ---
        loadData();
        render();

        setInterval(function() {
            if (DATA.phase === 'vote') {
                updateVoteStatus();
                checkAutoComplete();
            }
        }, 10000);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                initWheel();
            });
        } else {
            initWheel();
        }

        console.log('🎵 THE DOGS — Голосование + Фортуна (с весами) запущены.');
    })();
</script>
</body>
</html>
