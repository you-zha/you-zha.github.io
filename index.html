<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Голосование THE DOGS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12121c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #eee;
        }
        .container { max-width: 800px; width: 100%; background: #1e1e30; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); }
        h1 {
            text-align: center;
            color: #f0a030;
            margin-bottom: 10px;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .phase-box { background: #2a2a40; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #f0a030; }
        .phase-title { font-weight: bold; font-size: 18px; color: #f0a030; margin-bottom: 5px; }
        .phase-desc { color: #bbb; font-size: 14px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-row label { min-width: 30px; font-weight: bold; color: #aaa; }
        .input-row input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #444; background: #12121c; color: #fff; }
        .btn { background: #f0a030; color: #12121c; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin: 5px 0; }
        .btn:hover { background: #d48a1a; transform: scale(1.02); }
        .btn-secondary { background: #3a3a5a; color: #ddd; }
        .btn-secondary:hover { background: #4a4a6a; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .hidden { display: none !important; }
        .song-list { background: #12121c; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .song-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #333; }
        .song-item:last-child { border-bottom: none; }
        .song-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f0a030; }
        .result-box { background: #12121c; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid #f0a030; }
        .winner { background: #2a3a2a; padding: 6px 12px; border-radius: 6px; margin: 4px 0; }
        .status { color: #888; font-size: 14px; text-align: center; margin-top: 15px; }
        .voter-name { margin: 10px 0; }
        .voter-name input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #12121c; color: #fff; font-size: 16px; }
        .result-votes { font-size: 14px; color: #aaa; margin-left: 10px; }
        .footer { text-align: center; color: #555; font-size: 12px; margin-top: 25px; }
        .warning { color: #f0a030; font-size: 14px; margin-top: 5px; }
        .green { color: #6c6; }
        /* Панель разработчика */
        .dev-panel { background: #2a2a40; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px dashed #f0a030; }
        .dev-panel .btn { font-size: 13px; padding: 8px 16px; margin-right: 8px; }
        .dev-panel .btn-danger { background: #a03030; color: #fff; }
        .dev-panel .btn-danger:hover { background: #802020; }
        .dev-panel .btn-sm { font-size: 13px; padding: 6px 12px; }
        .dev-panel .phase-indicator { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-left: 10px; }
        .phase-collect { background: #2a4a2a; color: #8c8; }
        .phase-vote { background: #4a3a2a; color: #f0a030; }
        .phase-results { background: #2a3a4a; color: #8cf; }
        .phase-wait { background: #3a3a3a; color: #888; }
        .dev-hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="mainTitle">🎵 THE DOGS — голосование</h1>
    <div class="subtitle">Самара (UTC+4) • Каждый участник → 4 песни → 6 лучших</div>

    <!-- Панель разработчика (появляется по клику на заголовок 3 раза) -->
    <div id="devPanel" class="dev-panel dev-hidden">
        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
            <span style="font-weight: bold; color: #f0a030;">🛠️ Режим разработчика</span>
            <span id="devPhaseIndicator" class="phase-indicator phase-collect">collect</span>
            <button class="btn btn-sm btn-danger" id="devResetBtn">🔄 Сбросить всё</button>
            <button class="btn btn-sm" id="devForcePhaseBtn">⏩ Принудительно переключить фазу</button>
            <button class="btn btn-sm btn-secondary" id="devHidePanelBtn">✖️ Скрыть</button>
        </div>
        <div style="margin-top: 6px; font-size: 13px; color: #aaa;">
            <span id="devStatus">Данные: </span>
        </div>
    </div>

    <!-- Блок для отображения текущей фазы -->
    <div id="phaseDisplay" class="phase-box">
        <div class="phase-title" id="phaseTitle">Загрузка...</div>
        <div class="phase-desc" id="phaseDesc"></div>
    </div>

    <!-- ФАЗА 1: СБОР ПЕСЕН -->
    <div id="phaseCollect" class="hidden">
        <div id="inputArea"></div>
        <button class="btn" id="addMemberBtn">➕ Добавить участника</button>
        <button class="btn btn-secondary" id="finishCollectBtn">✅ Завершить сбор</button>
        <div id="collectStatus" class="status"></div>
        <div id="collectWarning" class="warning"></div>
    </div>

    <!-- ФАЗА 2: ГОЛОСОВАНИЕ -->
    <div id="phaseVote" class="hidden">
        <div class="voter-name">
            <input type="text" id="voterName" placeholder="Ваше имя (необязательно)">
        </div>
        <div id="votingList" class="song-list"></div>
        <button class="btn" id="voteBtn">🗳️ Проголосовать</button>
        <div id="voteStatus" class="status"></div>
        <div id="alreadyVoted" class="status" style="color: #f0a030;"></div>
    </div>

    <!-- ФАЗА 3: РЕЗУЛЬТАТЫ -->
    <div id="phaseResults" class="hidden">
        <div id="resultBox" class="result-box"></div>
        <button class="btn btn-secondary" id="resetBtn">🔄 Начать новый цикл</button>
    </div>

    <!-- ФАЗА 4: ОЖИДАНИЕ -->
    <div id="phaseWait" class="hidden">
        <div class="phase-box" style="border-left-color: #888;">
            <div class="phase-title">⏳ Ожидание</div>
            <div class="phase-desc" id="waitDesc"></div>
        </div>
    </div>

    <div class="footer">
        <span id="clockDisplay">⏰ ...</span>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // --- КОНСТАНТЫ ---
        const TZ = 'Europe/Samara';
        const SONGS_PER_MEMBER = 4;
        const VOTE_LIMIT = 6;
        const STORAGE_KEY = 'the_dogs_voting_data';
        const MAX_MEMBERS = 3;
        const PHASES = ['collect', 'vote', 'results', 'wait'];

        // --- ДАННЫЕ ---
        function loadData() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return { songs: [], votes: {}, voters: [], phase: 'collect', lastReset: null, devPhase: null };
            try { return JSON.parse(raw); }
            catch { return { songs: [], votes: {}, voters: [], phase: 'collect', lastReset: null, devPhase: null }; }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // --- ВРЕМЯ ---
        function getSamaraTime() {
            const now = new Date();
            return new Date(now.toLocaleString('en-US', { timeZone: TZ }));
        }

        function getRealPhase() {
            const now = getSamaraTime();
            const day = now.getDay();
            const hours = now.getHours();
            if (day === 0) return 'vote';
            if (day === 1) return 'results';
            if (day === 2 && hours >= 12) return 'collect';
            if (day === 2 && hours < 12) return 'results';
            return 'collect';
        }

        function getCurrentPhase() {
            const data = loadData();
            // Если установлена dev-фаза — используем её, иначе реальное время
            if (data.devPhase && PHASES.includes(data.devPhase)) {
                return data.devPhase;
            }
            return getRealPhase();
        }

        function getPhaseDescription(phase) {
            const now = getSamaraTime();
            const day = now.getDay();
            const hours = now.getHours();
            switch(phase) {
                case 'collect':
                    let deadline = new Date(now);
                    let daysUntilSun = (7 - day) % 7;
                    if (daysUntilSun === 0 && hours >= 0) daysUntilSun = 7;
                    deadline.setDate(deadline.getDate() + daysUntilSun);
                    deadline.setHours(0, 0, 0, 0);
                    const diff = Math.floor((deadline - now) / (1000 * 60 * 60));
                    return `📥 Сбор песен. Осталось ${diff} часов до дедлайна (воскресенье 00:00). Каждый участник добавляет 4 песни.`;
                case 'vote':
                    return `🗳️ Голосование! Выберите 6 песен из списка. Голосование завершится в понедельник 00:00.`;
                case 'results':
                    return `🏆 Итоги голосования. 6 песен с наибольшим числом голосов — в репертуар.`;
                case 'wait':
                    return `⏳ Ожидание. Следующий сбор песен начнётся во вторник в 12:00.`;
                default:
                    return '';
            }
        }

        // --- РЕНДЕРИНГ ---
        function render() {
            const data = loadData();
            const phase = getCurrentPhase();

            // Часы
            const now = getSamaraTime();
            document.getElementById('clockDisplay').textContent = '🕒 ' + now.toLocaleString('ru-RU', { timeZone: TZ });

            // Описание фазы
            document.getElementById('phaseTitle').textContent = 
                phase === 'collect' ? '📥 Сбор песен' :
                phase === 'vote' ? '🗳️ Голосование' :
                phase === 'results' ? '🏆 Результаты' : '⏳ Ожидание';
            document.getElementById('phaseDesc').textContent = getPhaseDescription(phase);

            // Обновляем индикатор фазы в dev-панели
            const indicator = document.getElementById('devPhaseIndicator');
            indicator.textContent = phase;
            indicator.className = 'phase-indicator phase-' + phase;

            // Скрыть все фазы
            document.getElementById('phaseCollect').classList.add('hidden');
            document.getElementById('phaseVote').classList.add('hidden');
            document.getElementById('phaseResults').classList.add('hidden');
            document.getElementById('phaseWait').classList.add('hidden');

            // Статус dev-панели
            document.getElementById('devStatus').textContent = 
                `Данные: ${data.songs.length} песен, ${data.voters.length} проголосовавших. Режим: ${data.devPhase || 'авто'}`;

            if (phase === 'collect') {
                document.getElementById('phaseCollect').classList.remove('hidden');
                renderCollectPhase(data);
            } else if (phase === 'vote') {
                document.getElementById('phaseVote').classList.remove('hidden');
                renderVotePhase(data);
            } else if (phase === 'results') {
                document.getElementById('phaseResults').classList.remove('hidden');
                renderResultsPhase(data);
            } else {
                document.getElementById('phaseWait').classList.remove('hidden');
                const now2 = getSamaraTime();
                const nextCollect = new Date(now2);
                let daysUntilTue = (2 - now2.getDay() + 7) % 7;
                if (daysUntilTue === 0 && now2.getHours() >= 12) daysUntilTue = 7;
                nextCollect.setDate(nextCollect.getDate() + daysUntilTue);
                nextCollect.setHours(12, 0, 0, 0);
                const diffHours = Math.floor((nextCollect - now2) / (1000 * 60 * 60));
                document.getElementById('waitDesc').textContent =
                    `Новый сбор песен начнётся во вторник в 12:00. Осталось ${diffHours} часов.`;
            }
        }

        // --- ФАЗА СБОРА ---
        function renderCollectPhase(data) {
            const area = document.getElementById('inputArea');
            const status = document.getElementById('collectStatus');
            const warning = document.getElementById('collectWarning');
            const addBtn = document.getElementById('addMemberBtn');
            const finishBtn = document.getElementById('finishCollectBtn');

            area.innerHTML = '';
            warning.textContent = '';

            if (data.songs.length > 0) {
                const list = document.createElement('div');
                list.style.marginBottom = '10px';
                list.style.padding = '10px';
                list.style.background = '#12121c';
                list.style.borderRadius = '8px';
                list.innerHTML = `<strong>Добавлено:</strong> ${data.songs.length} песен`;
                area.appendChild(list);
            }

            const currentMembers = Math.ceil(data.songs.length / SONGS_PER_MEMBER);
            if (data.songs.length < 12) {
                const memberDiv = document.createElement('div');
                memberDiv.className = 'input-group';
                memberDiv.style.border = '1px solid #444';
                memberDiv.style.padding = '12px';
                memberDiv.style.borderRadius = '10px';
                memberDiv.style.marginBottom = '10px';

                const title = document.createElement('p');
                title.textContent = `Участник ${currentMembers + 1}`;
                title.style.fontWeight = 'bold';
                title.style.color = '#f0a030';
                memberDiv.appendChild(title);

                const inputs = [];
                for (let i = 0; i < SONGS_PER_MEMBER; i++) {
                    const row = document.createElement('div');
                    row.className = 'input-row';
                    const label = document.createElement('label');
                    label.textContent = `${i + 1}.`;
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = `Песня ${i + 1}`;
                    input.className = 'member-song-input';
                    row.appendChild(label);
                    row.appendChild(input);
                    memberDiv.appendChild(row);
                    inputs.push(input);
                }

                const addMemberBtn = document.createElement('button');
                addMemberBtn.className = 'btn btn-secondary';
                addMemberBtn.textContent = '➕ Добавить песни';
                addMemberBtn.style.width = '100%';
                addMemberBtn.addEventListener('click', function() {
                    const songs = inputs.map(inp => inp.value.trim());
                    if (songs.some(s => s === '')) {
                        alert('Заполните все 4 поля!');
                        return;
                    }
                    if (data.songs.length + songs.length > 12) {
                        alert(`Нельзя добавить больше 12 песен. Сейчас ${data.songs.length}.`);
                        return;
                    }
                    data.songs.push(...songs);
                    saveData(data);
                    render();
                });
                memberDiv.appendChild(addMemberBtn);
                area.appendChild(memberDiv);
            } else {
                warning.textContent = '✅ Все 12 песен собраны! Переходите к голосованию.';
                warning.style.color = '#6c6';
            }

            addBtn.disabled = (data.songs.length >= 12);
            addBtn.textContent = data.songs.length >= 12 ? '❌ Все добавлены' : '➕ Добавить участника';

            finishBtn.disabled = (data.songs.length !== 12);
            finishBtn.textContent = data.songs.length === 12 ? '✅ Завершить сбор' : 
                `⏳ Нужно ещё ${12 - data.songs.length} песен`;

            status.textContent = `Всего: ${data.songs.length} / 12 песен`;
        }

        // --- ФАЗА ГОЛОСОВАНИЯ ---
        function renderVotePhase(data) {
            const list = document.getElementById('votingList');
            const status = document.getElementById('voteStatus');
            const alreadyDiv = document.getElementById('alreadyVoted');
            const nameInput = document.getElementById('voterName');
            const voteBtn = document.getElementById('voteBtn');

            nameInput.value = '';
            alreadyDiv.textContent = '';
            status.textContent = '';

            if (data.songs.length !== 12) {
                list.innerHTML = '<p style="color:#888;">Недостаточно песен.</p>';
                voteBtn.classList.add('hidden');
                return;
            }

            const shuffled = [...data.songs];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            list.innerHTML = '';
            shuffled.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <input type="checkbox" id="vote_${index}" data-index="${index}">
                    <span>${index + 1}. ${song}</span>
                `;
                list.appendChild(div);
            });

            const checkboxes = list.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.addEventListener('change', function() {
                    const checked = list.querySelectorAll('input[type="checkbox"]:checked');
                    if (checked.length > VOTE_LIMIT) {
                        this.checked = false;
                        alert(`Можно выбрать не больше ${VOTE_LIMIT} песен.`);
                    }
                });
            });

            voteBtn.classList.remove('hidden');
            voteBtn.disabled = false;

            const currentName = nameInput.value.trim();
            if (currentName && data.voters.includes(currentName)) {
                alreadyDiv.textContent = `❌ ${currentName}, вы уже проголосовали.`;
                checkboxes.forEach(cb => cb.disabled = true);
                voteBtn.disabled = true;
            }

            voteBtn.onclick = function() {
                const name = nameInput.value.trim();
                if (name && data.voters.includes(name)) {
                    alreadyDiv.textContent = `❌ ${name}, вы уже проголосовали.`;
                    return;
                }

                const checked = list.querySelectorAll('input[type="checkbox"]:checked');
                if (checked.length === 0) {
                    alert('Выберите хотя бы одну песню.');
                    return;
                }

                const selectedIndices = [];
                checked.forEach(cb => {
                    selectedIndices.push(parseInt(cb.dataset.index));
                });

                const voterKey = name || 'anonymous_' + Date.now();
                data.votes[voterKey] = selectedIndices;
                if (name) data.voters.push(name);
                saveData(data);

                checkboxes.forEach(cb => cb.disabled = true);
                voteBtn.disabled = true;
                alreadyDiv.textContent = `✅ ${name || 'Аноним'}, ваш голос учтён!`;
                status.textContent = `Проголосовало: ${data.voters.length} человек.`;
                render();
            };

            status.textContent = data.voters.length > 0 ? `Проголосовало: ${data.voters.length} человек.` : 'Никто не голосовал.';
        }

        // --- ФАЗА РЕЗУЛЬТАТОВ ---
        function renderResultsPhase(data) {
            const box = document.getElementById('resultBox');
            if (data.songs.length < 12) {
                box.innerHTML = '<p style="color:#888;">Недостаточно данных.</p>';
                return;
            }

            const voteCounts = {};
            data.songs.forEach((song, idx) => { voteCounts[idx] = 0; });

            for (const voterName in data.votes) {
                const indices = data.votes[voterName];
                indices.forEach(idx => {
                    if (voteCounts[idx] !== undefined) voteCounts[idx] += 1;
                });
            }

            const sorted = Object.entries(voteCounts).sort((a, b) => b[1] - a[1]);
            const top6 = sorted.slice(0, 6);

            let html = `<h3 style="color:#f0a030;">🏆 Топ-6 песен</h3>`;
            top6.forEach(([idx, count], pos) => {
                const song = data.songs[parseInt(idx)];
                html += `<div class="winner">${pos+1}. ${song} — <span class="result-votes">${count} голосов</span></div>`;
            });

            html += `<div style="margin-top: 15px; color: #888; font-size: 14px;">👥 Проголосовало: ${data.voters.length} человек</div>`;
            box.innerHTML = html;

            document.getElementById('resetBtn').onclick = function() {
                if (confirm('Сбросить все данные?')) {
                    localStorage.removeItem(STORAGE_KEY);
                    location.reload();
                }
            };
        }

        // --- РЕЖИМ РАЗРАБОТЧИКА ---
        let clickCount = 0;
        let devPanelVisible = false;

        document.getElementById('mainTitle').addEventListener('click', function() {
            clickCount++;
            if (clickCount >= 3) {
                toggleDevPanel();
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        });

        function toggleDevPanel() {
            const panel = document.getElementById('devPanel');
            if (devPanelVisible) {
                panel.classList.add('dev-hidden');
                devPanelVisible = false;
            } else {
                panel.classList.remove('dev-hidden');
                devPanelVisible = true;
            }
        }

        document.getElementById('devHidePanelBtn').addEventListener('click', function() {
            document.getElementById('devPanel').classList.add('dev-hidden');
            devPanelVisible = false;
        });

        document.getElementById('devResetBtn').addEventListener('click', function() {
            if (confirm('Сбросить все данные (песни, голоса, фазы)?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        });

        document.getElementById('devForcePhaseBtn').addEventListener('click', function() {
            const data = loadData();
            const phases = ['collect', 'vote', 'results', 'wait'];
            const current = data.devPhase || getRealPhase();
            let idx = phases.indexOf(current);
            if (idx === -1) idx = 0;
            const next = phases[(idx + 1) % phases.length];
            data.devPhase = next;
            saveData(data);
            render();
        });

        // --- ИНИЦИАЛИЗАЦИЯ ---
        document.getElementById('addMemberBtn').addEventListener('click', function() { render(); });

        document.getElementById('finishCollectBtn').addEventListener('click', function() {
            const data = loadData();
            if (data.songs.length !== 12) {
                alert(`Сейчас ${data.songs.length} песен. Нужно ровно 12.`);
                return;
            }
            alert('Сбор завершён! Переход к голосованию.');
            // Убираем dev-фазу, чтобы переключиться на реальное время, если возможно
            const data2 = loadData();
            if (data2.devPhase) {
                data2.devPhase = 'vote';
                saveData(data2);
            }
            render();
        });

        setInterval(render, 10000);
        render();
        console.log('🎵 Голосование THE DOGS (Самара, UTC+4). Режим разработчика: 3 клика по заголовку.');
    })();
</script>
</body>
</html>
